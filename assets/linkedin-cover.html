<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap");
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #F0EAD6;
    }
    .cover {
      width: 1584px;
      height: 396px;
      background: #F0EAD6;
      display: flex;
      align-items: center;
      justify-content: center;
      /* keep clear of LinkedIn profile photo on the left */
      padding: 0 80px 0 280px;
    }
    h1 {
      font-family: "DM Serif Display", Georgia, serif;
      font-weight: 400;
      font-size: 72px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: #141414;
      text-align: center;
    }
    h1 em {
      font-style: italic;
      background: linear-gradient(135deg, #00e5a8 0%, #00bcd4 45%, #00897b 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: #00bcd4;
    }
  </style>
</head>
<body>
  <div class="cover">
    <h1>From creatives <em>to</em> cart.</h1>
  </div>
</body>
</html>
